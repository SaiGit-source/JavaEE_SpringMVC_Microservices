spring.application.name=safebank-ledger-api
server.port=8086

spring.datasource.url=jdbc:mariadb://localhost:3306/safebank_ledger
spring.datasource.username=root
spring.datasource.password=maria
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect





# Force Spring Boot to run your schema.sql and data.sql scripts
spring.sql.init.mode=always

# Tell Hibernate to let your manual schema.sql script build the tables
spring.jpa.hibernate.ddl-auto=none

